services:
  postgres:
    image: postgis/postgis:16-3.4
    environment:
      POSTGRES_DB: parkhub
      POSTGRES_USER: parkhub
      POSTGRES_PASSWORD: parkhub
    ports:
      - "5432:5432"
    volumes:
      - parkhub-postgres:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U parkhub -d parkhub"]
      interval: 5s
      timeout: 5s
      retries: 10

  redis:
    image: redis:7-alpine
    ports:
      - "6379:6379"
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 5s
      retries: 10

volumes:
  parkhub-postgres:
